<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Writeups - Web</title>
  <link rel="stylesheet" href="../main_style.css" />
  <style>
    .hint { display: none; margin-top: 0.5rem; color: #333; background: #f4f4f4; padding: 0.5rem; border-left: 3px solid #1a73e8; }
    .checklist-item.checked { text-decoration: line-through; color: gray; }
    .toggle-btn { margin: 0.5rem 0; padding: 0.3rem 0.6rem; cursor: pointer; font-size: 0.9rem; background: #1a73e8; color: white; border: none; border-radius: 5px; }
  </style>
</head>
<body>
  <header>
    <h1>Web 카테고리 문제 풀이</h1>
    <p>웹 취약점 기반 문제들에 대한 Writeup 모음입니다.</p>
  </header>

  <nav>
    <ul></ul>
  </nav>
  <script src="../nav.js"></script>

  <main>
    <section class="category">
      <h2>📝 Web 문제 1: XSS 기반 플래그 획득</h2>
      <ul id="checklist1">
        <li><input type="checkbox" onclick="toggleCheck(this)"> 웹 페이지의 입력 필드 확인</li>
        <li><input type="checkbox" onclick="toggleCheck(this)"> `<script>` 삽입 시도</li>
        <li><input type="checkbox" onclick="toggleCheck(this)"> 쿠키 탈취용 페이로드 사용</li>
      </ul>

      <button class="toggle-btn" onclick="toggleHint('hint1')">힌트 보기/숨기기</button>
      <div id="hint1" class="hint">힌트: 쿠키 정보는 document.cookie 로 접근할 수 있어요.</div>

      <p>공격 성공 후 관리자 계정으로 쿠키를 획득하고 인증에 재사용하면 플래그가 나옵니다.</p>
    </section>
  </main>

  <script>
    function toggleCheck(checkbox) {
      const li = checkbox.parentElement;
      li.classList.toggle('checked', checkbox.checked);
    }

    function toggleHint(id) {
      const hint = document.getElementById(id);
      hint.style.display = (hint.style.display === 'none') ? 'block' : 'none';
    }
  </script>

  <footer>
    <p>© 2025 CTF 정보 포털 | 제작: ChatGPT + 사용자</p>
  </footer>
</body>
</html>

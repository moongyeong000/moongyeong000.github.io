<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>드래그 앤 드롭 실습 - CTF 실전 자료실</title>
  <link rel="stylesheet" href="../css/style.css">
  <script src="../js/main.js" defer></script>
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>
  <header>
    <h1>드래그 앤 드롭 실습</h1>
    <nav>
  		<button id="darkmode-toggle">다크모드</button>
    </nav>
  </header>
  <main>
    <section>
      <h2 class="center">숨겨진 내용 보기 실습</h2>
      <div id="drag" draggable="true" class="drag-item">
        <span>이 박스를 드래그하세요!</span>
      </div>
      <div id="drop" class="drop-zone">
        <img src="../images/drop_zone.png" alt="드롭존 아이콘" style="width:48px;vertical-align:middle;">
        <span>여기에 드롭</span>
      </div>
      <div id="hidden" class="hidden-content">
        <img src="../images/hidden_flag.png" alt="숨겨진 플래그" style="width:48px;vertical-align:middle;">
        <b>🎉 숨겨진 내용이 나타났습니다! flag{drag_and_drop_success}</b>
        <div id="drag-hint" class="drag-hint" draggable="true">여기를 드래그해보세요!</div>
		<div id="hidden-content" class="hidden-content">🎉 숨겨진 내용이 나타났습니다!</div>
      </div>
    </section>
    <section>
      <h2 class="center">실습 사용법</h2>
      <ul>
        <li>위의 박스를 마우스로 클릭해 드래그하세요.</li>
        <li>아래의 드롭존에 끌어다 놓으면 숨겨진 내용이 표시됩니다.</li>
        <li>실전 CTF에서 플래그/힌트/파일 공개 등에 활용할 수 있습니다.</li>
      	<li><a href="../index.html">메인으로 돌아가기</a></li>
      </ul>
    </section>
  </main>
  <footer>
    <p>© 2025 CTF 실전 자료실</p>
  </footer>
  <script src="../js/main.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />

  <title>strings</title>
  <link rel="stylesheet" href="../main_style.css" />
</head>
<body>
  <header>
    <h1>strings</h1>
  </header>

  <main>
    <section>
      <h2>기능 개요</h2>
      <p>바이너리 파일 내에 포함된 텍스트 문자열을 추출하는 데 사용됩니다. CTF에서 플래그나 힌트를 찾기 위한 기본 도구입니다.</p>
    </section>

    <section>
      <h2>사용 방법</h2>
      <ul>
        <li><code>strings &lt;filename&gt;</code> 명령으로 사용</li>
        <li>유의미한 문자열 추출을 통해 힌트 또는 플래그 탐색</li>
        <li>grep과 함께 사용하여 특정 문자열 검색</li>
      </ul>
    </section>

    <section>
      <h2>활용 예시</h2>
      <ul>
        <li>바이너리 내부에 숨겨진 플래그 추출</li>
        <li>디버깅 전 사전 정보 수집</li>
        <li>기초 포렌식 문제에서 텍스트 스캔</li>
      </ul>
    </section>

    <section>
      <a href="../index.html">← 돌아가기</a>
